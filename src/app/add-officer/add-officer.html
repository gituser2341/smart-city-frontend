<div class="field-group">
  <label class="field-label" for="officer-name">Full Name *</label>
  <input id="officer-name" name="name" type="text" class="field-input"
    [(ngModel)]="name" placeholder="e.g. Rajesh Kumar"
    autocomplete="name" />
</div>

<div class="field-group">
  <label class="field-label" for="officer-email">Email *</label>
  <input id="officer-email" name="email" type="email" class="field-input"
    [(ngModel)]="email" placeholder="officer@smartcity.gov"
    autocomplete="off" />
</div>

<div class="field-group">
  <label class="field-label" for="officer-password">Password *</label>
  <input id="officer-password" name="password" type="password" class="field-input"
    [(ngModel)]="password" placeholder="Set a strong password"
    autocomplete="new-password" />
</div>

<div class="field-group">
  <label class="field-label" for="officer-dept">Department *</label>
  <div class="dept-grid" id="officer-dept">
    @for (d of departments; track d.value) {
      <div class="dept-card"
        [ngClass]="{'dept-selected': department === d.value}"
        (click)="department = d.value">
        <span class="dept-icon">{{ d.icon }}</span>
        <span class="dept-label">{{ d.label }}</span>
      </div>
    }
  </div>
</div>
